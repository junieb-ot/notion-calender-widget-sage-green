<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Calendar Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: transparent;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .calendar-widget {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 300px;
            width: 100%;
        }
        .calendar-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .card {
            background-color: #c8d7b9;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .card-label {
            color: #263611;
            font-size: 6px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        .card-value {
            color: #263611;
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 6px;
            font-variant-numeric: tabular-nums;
        }
        .card-subtext {
            color: #263611;
            font-size: 5.5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.7;
        }
        @media (max-width: 480px) {
            .calendar-widget {
                padding: 12px;
            }
            .card {
                min-height: 80px;
                padding: 12px;
            }
            .card-value {
                font-size: 26px;
            }
            .calendar-container {
                gap: 8px;
            }
        }
        .update-time {
            text-align: center;
            color: transparent;
            font-size: 1px;
            margin-top: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="calendar-widget">
        <div class="calendar-container">
            <div class="card">
                <div class="card-label">Month</div>
                <div class="card-value" id="month">03</div>
            </div>
            <div class="card">
                <div class="card-label">Day</div>
                <div class="card-value" id="day">26</div>
                <div class="card-subtext" id="dayname">Thu</div>
            </div>
        </div>
        <div class="update-time">Updated today</div>
    </div>
    <script>
        function updateCalendar() {
            const now = new Date();
            
            // Update month (01-12)
            const month = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('month').textContent = month;
            
            // Update day (01-31)
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('day').textContent = day;
            
            // Update day name
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const dayName = dayNames[now.getDay()];
            document.getElementById('dayname').textContent = dayName;
        }
        // Update on load
        updateCalendar();
        // Update every minute
        setInterval(updateCalendar, 60000);
    </script>
</body>
</html>
